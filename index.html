<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Test Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px 24px;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #facc15;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hello Wai Cong 👋</h1>
    <p>This website is hosted on GitHub Pages.</p>

    <button onclick="testClick()">Click Me</button>

    <div id="result"></div>
  </div>

  <script>
    function testClick() {
      document.getElementById("result").innerHTML =
        "Success! JavaScript is working 🚀";
    }
  </script>

</body>
</html>
